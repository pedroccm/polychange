<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1400, initial-scale=0.3">
  <title>PolyChange - Exchange Trading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Consolas, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }

    /* TOP BAR */
    .topbar {
      background: #16213e;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #0f3460;
    }
    .topbar .logo { font-weight: bold; font-size: 16px; color: #00d4ff; letter-spacing: 1px; }
    .topbar input {
      flex: 1;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
    .topbar input::placeholder { color: #555; }
    .topbar .btn {
      background: #0f3460;
      color: #00d4ff;
      border: 1px solid #00d4ff;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }
    .topbar .btn:hover { background: #00d4ff; color: #0a0a1a; }

    /* STATUS BAR */
    .status-bar {
      background: #12122a;
      padding: 4px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #0f3460;
      font-size: 11px;
      color: #666;
    }
    .status-bar .connected { color: #00ff88; }
    .status-bar .refresh-info { margin-left: auto; }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 300px 1fr 280px;
      height: calc(100vh - 72px);
    }

    /* LEFT PANEL */
    .panel-left {
      background: #12122a;
      border-right: 1px solid #0f3460;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .panel-title {
      padding: 8px 12px;
      background: #0f3460;
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #00d4ff;
    }
    .search-box {
      padding: 8px;
      border-bottom: 1px solid #1a1a3e;
    }
    .search-box input {
      width: 100%;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    .search-box input::placeholder { color: #444; }
    .events-list {
      flex: 1;
      overflow-y: auto;
    }
    .event-item {
      padding: 8px 10px;
      border-bottom: 1px solid #1a1a3e;
      cursor: pointer;
    }
    .event-item:hover { background: #1a1a3e; }
    .event-item.active { background: #0f3460; border-left: 3px solid #00d4ff; }
    .event-item .ev-title { font-size: 12px; font-weight: bold; margin-bottom: 4px; line-height: 1.3; }
    .event-item .ev-meta {
      font-size: 10px; color: #666;
      display: flex; justify-content: space-between;
    }
    .event-item .ev-outcomes {
      display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;
    }
    .event-item .ev-out {
      font-size: 10px; padding: 2px 6px; border-radius: 2px;
      background: #1a1a3e; color: #888;
    }
    .event-item .ev-out .price { color: #00d4ff; font-weight: bold; }
    .event-item .ev-vol { color: #555; font-size: 10px; }
    .loading-msg { padding: 20px; text-align: center; color: #555; }

    /* CENTER PANEL */
    .panel-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .event-header {
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .event-header h2 { font-size: 15px; color: #fff; margin-bottom: 4px; }
    .event-header .meta { font-size: 11px; color: #666; }
    .event-header .meta span { color: #00d4ff; }

    /* LADDERS ROW */
    .ladders-row {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: #0f3460;
    }
    .ladder-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      overflow: hidden;
      min-width: 0;
    }
    .ladder-title {
      text-align: center;
      padding: 6px 4px;
      font-weight: bold;
      font-size: 11px;
      border-bottom: 1px solid #0f3460;
      background: #0a2a4a;
      color: #6abcff;
    }
    .ladder-title .best-price {
      font-size: 18px;
      display: block;
      margin-top: 2px;
      color: #00d4ff;
    }
    .ladder-title .best-spread {
      font-size: 10px;
      color: #888;
      display: block;
    }

    .ladder-scroll {
      flex: 1;
      overflow-y: auto;
    }
    .ladder-table {
      width: 100%;
      border-collapse: collapse;
    }
    .ladder-table th {
      position: sticky; top: 0;
      padding: 4px 4px;
      font-size: 10px;
      text-transform: uppercase;
      z-index: 2;
    }
    .ladder-table th.back-h { background: #0d3560; color: #6abcff; }
    .ladder-table th.price-h { background: #1a1a2e; color: #888; }
    .ladder-table th.lay-h { background: #3d1525; color: #ff6a8a; }

    .ladder-table td {
      padding: 2px 4px;
      text-align: center;
      border-bottom: 1px solid #12122a;
      height: 24px;
      font-size: 12px;
    }

    .ladder-table .back-cell {
      background: #0d3560; color: #6abcff;
      cursor: pointer; position: relative;
    }
    .ladder-table .back-cell:hover { background: #1a5a90; }
    .ladder-table .back-cell .bar {
      position: absolute; top: 1px; bottom: 1px; right: 0;
      background: #4a9eff; opacity: 0.25; border-radius: 1px;
    }
    .ladder-table .back-cell .val { position: relative; z-index: 1; }

    .ladder-table .price-cell {
      font-weight: bold; color: #fff;
      background: #1a1a2e; font-size: 13px; min-width: 36px;
    }
    .ladder-table .price-cell.best-bid {
      background: #0a3a5a; color: #6abcff;
      box-shadow: inset 0 0 6px rgba(74,158,255,0.3);
    }
    .ladder-table .price-cell.best-ask {
      background: #4a1a2a; color: #ff6a8a;
      box-shadow: inset 0 0 6px rgba(255,106,138,0.3);
    }

    .ladder-table .lay-cell {
      background: #3d1525; color: #ff6a8a;
      cursor: pointer; position: relative;
    }
    .ladder-table .lay-cell:hover { background: #6a2a3a; }
    .ladder-table .lay-cell .bar {
      position: absolute; top: 1px; bottom: 1px; left: 0;
      background: #ff6a8a; opacity: 0.25; border-radius: 1px;
    }
    .ladder-table .lay-cell .val { position: relative; z-index: 1; }

    .ladder-table .back-cell.has-vol { background: #104a80; }
    .ladder-table .lay-cell.has-vol { background: #5a1a30; }

    .no-data { padding: 40px; text-align: center; color: #444; font-size: 14px; }

    /* ORDER TICKET */
    .order-ticket {
      background: #16213e;
      border-top: 2px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ticket-out {
      display: flex; gap: 4px;
    }
    .ticket-out .out-btn {
      padding: 5px 10px;
      border: 1px solid #333;
      background: #1a1a2e; color: #888;
      border-radius: 3px; cursor: pointer;
      font-size: 11px; font-weight: bold;
    }
    .ticket-out .out-btn.active { border-color: #00d4ff; color: #00d4ff; background: #0a2a4a; }

    .ticket-side { display: flex; gap: 4px; }
    .ticket-side .s-btn {
      padding: 5px 12px; border: none; border-radius: 3px;
      font-weight: bold; cursor: pointer; font-size: 12px;
    }
    .ticket-side .s-btn.back { background: #0d3560; color: #6abcff; }
    .ticket-side .s-btn.back.active { background: #1a6aaa; color: #fff; }
    .ticket-side .s-btn.lay { background: #3d1525; color: #ff6a8a; }
    .ticket-side .s-btn.lay.active { background: #8a2a4a; color: #fff; }

    .t-field { display: flex; flex-direction: column; gap: 1px; }
    .t-field label { font-size: 10px; color: #666; }
    .t-field input {
      background: #0a0a1a; border: 1px solid #0f3460;
      color: #e0e0e0; padding: 5px 8px; border-radius: 3px;
      width: 70px; text-align: center; font-size: 13px;
    }
    .quick-stakes { display: flex; gap: 3px; }
    .quick-stakes button {
      background: #1a1a3e; color: #888; border: 1px solid #2a2a4e;
      padding: 4px 8px; border-radius: 2px; font-size: 10px; cursor: pointer;
    }
    .quick-stakes button:hover { background: #2a2a4e; color: #ccc; }
    .submit-btn {
      padding: 5px 20px; background: #00d4ff; color: #0a0a1a;
      border: none; border-radius: 3px; font-weight: bold;
      cursor: pointer; font-size: 13px;
    }
    .submit-btn:hover { background: #00eeff; }
    .t-payout { color: #00ff88; font-size: 11px; margin-left: auto; }

    /* RIGHT PANEL */
    .panel-right {
      background: #12122a;
      border-left: 1px solid #0f3460;
      overflow-y: auto;
    }
    .pos-item {
      padding: 8px 10px; border-bottom: 1px solid #1a1a3e;
    }
    .pos-item .pos-mkt { font-size: 11px; color: #888; margin-bottom: 3px; }
    .pos-item .pos-row {
      display: flex; justify-content: space-between;
      font-size: 12px; margin-bottom: 2px;
    }
    .pos-back { color: #6abcff; font-weight: bold; }
    .pos-lay { color: #ff6a8a; font-weight: bold; }
    .pnl-pos { color: #00ff88; font-weight: bold; }
    .pnl-neg { color: #ff4444; font-weight: bold; }
    .pos-item button {
      background: #2a1a1a; color: #ff6a6a; border: 1px solid #ff4444;
      padding: 2px 8px; border-radius: 2px; font-size: 10px;
      cursor: pointer; margin-top: 3px;
    }
    .pos-item button:hover { background: #ff4444; color: #fff; }
    .ord-item {
      padding: 6px 10px; border-bottom: 1px solid #1a1a3e;
      display: flex; justify-content: space-between; align-items: center; font-size: 12px;
    }
    .cancel-btn {
      background: none; border: 1px solid #ff4444; color: #ff4444;
      padding: 2px 6px; border-radius: 2px; font-size: 10px; cursor: pointer;
    }
    .cancel-btn:hover { background: #ff4444; color: #fff; }
    .empty-msg { padding: 12px; text-align: center; color: #444; font-size: 11px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">POLYCHANGE</div>
    <input type="text" id="url-input" placeholder="Cole URL do Polymarket ou pesquise... (ex: soccer, nba, trump)" />
    <button class="btn" onclick="searchOrLoad()">SEARCH</button>
    <button class="btn" onclick="loadFromUrl()" style="background:#0a2a4a;">LOAD URL</button>
  </div>

  <div class="status-bar">
    <span class="connected" id="status-dot">● API OK</span>
    <span id="status-event">No event loaded</span>
    <span class="refresh-info" id="refresh-info">Auto-refresh: 3s</span>
  </div>

  <div class="main">

    <!-- LEFT: EVENTS -->
    <div class="panel-left">
      <div class="panel-title">Events</div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Filter events..." oninput="filterEvents()" />
      </div>
      <div class="events-list" id="events-list">
        <div class="loading-msg">Search for events above</div>
      </div>
    </div>

    <!-- CENTER: LADDERS -->
    <div class="panel-center">
      <div class="event-header" id="event-header">
        <h2 id="event-title">No event loaded</h2>
        <div class="meta" id="event-meta">Search or paste a Polymarket URL to get started</div>
      </div>

      <div class="ladders-row" id="ladders-row">
        <div class="no-data">Select an event to view the exchange ladder</div>
      </div>

      <!-- ORDER TICKET -->
      <div class="order-ticket" id="order-ticket" style="display:none;">
        <div class="ticket-out" id="ticket-outcomes"></div>
        <div class="ticket-side">
          <button class="s-btn back active" id="side-back" onclick="setSide('back')">BACK</button>
          <button class="s-btn lay" id="side-lay" onclick="setSide('lay')">LAY</button>
        </div>
        <div class="t-field">
          <label>Price ¢</label>
          <input type="number" id="ord-price" value="50" min="1" max="99" oninput="updateTicket()" />
        </div>
        <div class="t-field">
          <label>Size $</label>
          <input type="number" id="ord-size" value="10" min="1" oninput="updateTicket()" />
        </div>
        <div class="quick-stakes">
          <button onclick="document.getElementById('ord-size').value=5;updateTicket()">$5</button>
          <button onclick="document.getElementById('ord-size').value=10;updateTicket()">$10</button>
          <button onclick="document.getElementById('ord-size').value=25;updateTicket()">$25</button>
          <button onclick="document.getElementById('ord-size').value=50;updateTicket()">$50</button>
          <button onclick="document.getElementById('ord-size').value=100;updateTicket()">$100</button>
        </div>
        <button class="submit-btn" onclick="placeOrder()">PLACE ORDER</button>
        <div class="t-payout" id="t-payout"></div>
      </div>
    </div>

    <!-- RIGHT: POSITIONS -->
    <div class="panel-right">
      <div class="panel-title">Open Positions</div>
      <div id="positions-list">
        <div class="empty-msg">No positions</div>
      </div>
      <div class="panel-title">Pending Orders</div>
      <div id="orders-list">
        <div class="empty-msg">No orders</div>
      </div>
      <div class="panel-title">History</div>
      <div id="history-list">
        <div class="empty-msg">No trades yet</div>
      </div>
    </div>

  </div>

<script>
const API = window.location.origin;  // same server
let allEvents = [];
let currentEvent = null;
let currentOutcomes = [];
let selectedOutcomeIdx = 0;
let selectedSide = 'back';
let refreshTimer = null;

// ========== Search & Load ==========

async function searchOrLoad() {
  const input = document.getElementById('url-input').value.trim();
  if (!input) return;

  // If it looks like a URL, load it
  if (input.includes('polymarket.com')) {
    return loadFromUrl();
  }

  // Otherwise search
  document.getElementById('events-list').innerHTML = '<div class="loading-msg">Searching...</div>';

  try {
    const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(input)}&limit=50`);
    allEvents = await resp.json();
    renderEventsList(allEvents);
  } catch (e) {
    document.getElementById('events-list').innerHTML = `<div class="loading-msg">Error: ${e.message}</div>`;
  }
}

async function loadFromUrl() {
  const input = document.getElementById('url-input').value.trim();
  if (!input) return;

  // Extract slug from URL
  const slugMatch = input.match(/polymarket\.com\/event\/([^/?#]+)/);
  if (!slugMatch) {
    alert('Invalid Polymarket URL. Expected format: https://polymarket.com/event/slug-here');
    return;
  }

  const slug = slugMatch[1];
  document.getElementById('event-header').querySelector('h2').textContent = 'Loading...';

  try {
    const resp = await fetch(`${API}/api/event/${slug}`);
    const event = await resp.json();

    if (event.error) {
      alert('Event not found: ' + event.error);
      return;
    }

    // Add to events list
    allEvents = [event];
    renderEventsList(allEvents);
    selectEvent(event);
  } catch (e) {
    alert('Error loading event: ' + e.message);
  }
}

// ========== Events List ==========

function renderEventsList(events) {
  const container = document.getElementById('events-list');
  if (!events.length) {
    container.innerHTML = '<div class="loading-msg">No events found</div>';
    return;
  }

  container.innerHTML = events.map((ev, i) => {
    const vol = ev.volume >= 1000000 ? `$${(ev.volume/1000000).toFixed(1)}M`
              : ev.volume >= 1000 ? `$${(ev.volume/1000).toFixed(0)}K`
              : `$${ev.volume.toFixed(0)}`;

    const outcomes = (ev.outcomes || []).map(o => {
      const price = Math.round(o.last_price * 100);
      const label = o.outcome || o.question.substring(0, 20);
      return `<span class="ev-out">${label} <span class="price">${price}¢</span></span>`;
    }).join('');

    return `<div class="event-item${currentEvent && currentEvent.slug === ev.slug ? ' active' : ''}"
                 onclick="selectEvent(allEvents[${i}])">
      <div class="ev-title">${ev.title}</div>
      <div class="ev-meta">
        <span class="ev-vol">Vol: ${vol}</span>
        <span>${ev.num_outcomes || ev.outcomes.length} outcomes</span>
      </div>
      <div class="ev-outcomes">${outcomes}</div>
    </div>`;
  }).join('');
}

function filterEvents() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allEvents.filter(e => e.title.toLowerCase().includes(q));
  renderEventsList(filtered);
}

// ========== Select Event ==========

async function selectEvent(event) {
  currentEvent = event;
  currentOutcomes = event.outcomes || [];
  selectedOutcomeIdx = 0;

  // Update header
  document.getElementById('event-title').textContent = event.title;

  const vol = event.volume >= 1000000 ? `$${(event.volume/1000000).toFixed(1)}M`
            : event.volume >= 1000 ? `$${(event.volume/1000).toFixed(0)}K`
            : `$${(event.volume||0).toFixed(0)}`;
  document.getElementById('event-meta').innerHTML =
    `Outcomes: <span>${currentOutcomes.length}</span> | Volume: <span>${vol}</span> | End: <span>${event.end_date || 'N/A'}</span>`;

  document.getElementById('status-event').textContent = event.title;

  // Update outcome buttons in ticket
  const ticketOut = document.getElementById('ticket-outcomes');
  ticketOut.innerHTML = currentOutcomes.map((o, i) => {
    const label = o.outcome || o.question.substring(0, 15);
    return `<button class="out-btn${i === 0 ? ' active' : ''}" onclick="selectOutcome(${i})">${label}</button>`;
  }).join('');

  document.getElementById('order-ticket').style.display = currentOutcomes.length ? 'flex' : 'none';

  // Build ladders
  buildLadders();
  await refreshBooks();

  // Start auto-refresh
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshBooks, 3000);

  // Re-render events list to show active
  renderEventsList(allEvents);
}

// ========== Ladders ==========

function buildLadders() {
  const container = document.getElementById('ladders-row');

  if (!currentOutcomes.length) {
    container.innerHTML = '<div class="no-data">No outcomes for this event</div>';
    return;
  }

  container.innerHTML = currentOutcomes.map((o, i) => {
    const label = o.outcome || o.question.substring(0, 25);
    return `<div class="ladder-panel">
      <div class="ladder-title">
        ${label}
        <span class="best-price" id="best-${i}">--¢</span>
        <span class="best-spread" id="spread-${i}">spread: --</span>
      </div>
      <div class="ladder-scroll" id="scroll-${i}">
        <table class="ladder-table">
          <thead><tr>
            <th class="back-h">BACK $</th>
            <th class="price-h">¢</th>
            <th class="lay-h">LAY $</th>
          </tr></thead>
          <tbody id="ladder-${i}"></tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

async function refreshBooks() {
  if (!currentOutcomes.length) return;

  // Collect all YES token IDs
  const tokens = currentOutcomes.map(o => o.yes_token).filter(Boolean);
  if (!tokens.length) return;

  try {
    const resp = await fetch(`${API}/api/books?tokens=${tokens.join(',')}`);
    const books = await resp.json();

    currentOutcomes.forEach((outcome, i) => {
      if (!outcome.yes_token || !books[outcome.yes_token]) return;
      const book = books[outcome.yes_token];
      renderLadder(i, book);
    });

    document.getElementById('status-dot').textContent = '● API OK';
    document.getElementById('status-dot').style.color = '#00ff88';
  } catch (e) {
    document.getElementById('status-dot').textContent = '● ERROR';
    document.getElementById('status-dot').style.color = '#ff4444';
  }
}

function renderLadder(idx, book) {
  const tbody = document.getElementById(`ladder-${idx}`);
  const scrollEl = document.getElementById(`scroll-${idx}`);
  if (!tbody) return;

  const bids = book.bids || {};  // {price_cents: size}
  const asks = book.asks || {};
  const bestBid = book.best_bid || 0;
  const bestAsk = book.best_ask || 0;

  // Find max volume for bar scaling
  let maxVol = 1;
  Object.values(bids).forEach(v => { if (v > maxVol) maxVol = v; });
  Object.values(asks).forEach(v => { if (v > maxVol) maxVol = v; });

  // Update header
  const midpoint = bestBid && bestAsk ? Math.round((bestBid + bestAsk) / 2) : (bestBid || bestAsk);
  document.getElementById(`best-${idx}`).textContent = `${midpoint}¢`;
  const spread = bestAsk && bestBid ? bestAsk - bestBid : 0;
  document.getElementById(`spread-${idx}`).textContent = `spread: ${spread}¢`;

  const fmtVol = (v) => {
    if (v >= 10000) return `$${(v/1000).toFixed(0)}K`;
    if (v >= 1000) return `$${(v/1000).toFixed(1)}K`;
    if (v > 0) return `$${Math.round(v)}`;
    return '';
  };

  // Save scroll position
  const prevScroll = scrollEl.scrollTop;
  const wasAtDefault = prevScroll === 0;

  let html = '';
  for (let p = 99; p >= 1; p--) {
    const bidVol = bids[p] || 0;
    const askVol = asks[p] || 0;
    const bidBar = bidVol > 0 ? Math.min(100, bidVol / maxVol * 100) : 0;
    const askBar = askVol > 0 ? Math.min(100, askVol / maxVol * 100) : 0;

    let priceClass = 'price-cell';
    if (p === bestBid) priceClass += ' best-bid';
    else if (p === bestAsk) priceClass += ' best-ask';

    html += `<tr>
      <td class="back-cell${bidVol > 0 ? ' has-vol' : ''}" onclick="clickLadder(${idx},${p},'back')">
        ${bidBar > 0 ? `<div class="bar" style="width:${bidBar}%"></div>` : ''}
        <span class="val">${fmtVol(bidVol)}</span>
      </td>
      <td class="${priceClass}">${p}</td>
      <td class="lay-cell${askVol > 0 ? ' has-vol' : ''}" onclick="clickLadder(${idx},${p},'lay')">
        ${askBar > 0 ? `<div class="bar" style="width:${askBar}%"></div>` : ''}
        <span class="val">${fmtVol(askVol)}</span>
      </td>
    </tr>`;
  }

  tbody.innerHTML = html;

  // Scroll to midpoint on first render
  if (wasAtDefault && midpoint > 0) {
    const rows = tbody.querySelectorAll('tr');
    const targetRow = rows[99 - midpoint];
    if (targetRow) {
      scrollEl.scrollTop = targetRow.offsetTop - scrollEl.clientHeight / 2;
    }
  } else {
    scrollEl.scrollTop = prevScroll;
  }
}

// ========== Order Ticket ==========

function clickLadder(outcomeIdx, price, side) {
  selectedOutcomeIdx = outcomeIdx;
  selectedSide = side;
  document.getElementById('ord-price').value = price;

  // Update outcome buttons
  document.querySelectorAll('.ticket-out .out-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === outcomeIdx);
  });
  setSide(side);
  updateTicket();
}

function selectOutcome(idx) {
  selectedOutcomeIdx = idx;
  document.querySelectorAll('.ticket-out .out-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
}

function setSide(side) {
  selectedSide = side;
  document.getElementById('side-back').classList.toggle('active', side === 'back');
  document.getElementById('side-lay').classList.toggle('active', side === 'lay');
}

function updateTicket() {
  const price = parseInt(document.getElementById('ord-price').value) || 50;
  const size = parseFloat(document.getElementById('ord-size').value) || 10;
  const contracts = Math.floor(size / (price / 100));
  const cost = (price / 100 * contracts).toFixed(2);
  const profit = (contracts - parseFloat(cost)).toFixed(2);
  document.getElementById('t-payout').textContent =
    `${contracts} contracts | Cost: $${cost} | Profit: $${profit}`;
}

async function placeOrder() {
  if (!currentOutcomes[selectedOutcomeIdx]) {
    alert('Select an outcome first');
    return;
  }

  const outcome = currentOutcomes[selectedOutcomeIdx];
  const price = parseInt(document.getElementById('ord-price').value);
  const size = parseFloat(document.getElementById('ord-size').value);
  const tokenId = selectedSide === 'back' ? outcome.yes_token : outcome.no_token;
  const apiSide = selectedSide === 'back' ? 'BUY' : 'SELL';

  const label = outcome.outcome || outcome.question.substring(0, 20);
  if (!confirm(`${selectedSide.toUpperCase()} ${label}\n${size} contracts @ ${price}¢\nToken: ${tokenId?.substring(0, 20)}...\n\nConfirm?`)) {
    return;
  }

  try {
    const resp = await fetch(`${API}/api/order`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        token_id: tokenId,
        price: price,
        size: size,
        side: apiSide,
      }),
    });
    const result = await resp.json();
    if (result.error) {
      alert('Order failed: ' + result.error);
    } else {
      alert('Order placed!');
      loadOrders();
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ========== Orders & Positions ==========

async function loadOrders() {
  try {
    const resp = await fetch(`${API}/api/orders`);
    const orders = await resp.json();
    const container = document.getElementById('orders-list');

    if (!orders.length) {
      container.innerHTML = '<div class="empty-msg">No pending orders</div>';
      return;
    }

    container.innerHTML = orders.map(o => `
      <div class="ord-item">
        <div>
          <span class="${o.side === 'BUY' ? 'pos-back' : 'pos-lay'}">${o.side}</span>
          ${o.size} @ ${Math.round(o.price * 100)}¢
        </div>
        <button class="cancel-btn" onclick="cancelOrder('${o.id}')">CANCEL</button>
      </div>
    `).join('');
  } catch (e) {
    // Silent fail - trade client might not be available
  }
}

async function cancelOrder(orderId) {
  if (!confirm('Cancel this order?')) return;
  try {
    await fetch(`${API}/api/cancel`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({order_id: orderId}),
    });
    loadOrders();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ========== Init ==========

// Enter key to search
document.getElementById('url-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchOrLoad();
});

updateTicket();

// Try loading orders on startup
loadOrders();
</script>
